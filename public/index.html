<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- مكتبات المعالجة داخل المتصفح: قراءة Word، OCR، تصدير Excel -->
  <!-- إصدارات مثبّتة + تحقّق سلامة (SRI): يرفض المتصفح أي ملف عُبث به على الـ CDN -->
  <script defer crossorigin="anonymous"

  <script defer crossorigin="anonymous"
    src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"
    integrity="sha384-Pqp51FUN2/qzfxZxBCtF0stpc9ONI6MYZpVqmo8m20SoaQCzf+arZvACkLkirlPz"></script>
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="app">
      <!-- تُبنى الواجهة عبر js/app.js -->
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
