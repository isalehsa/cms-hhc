# نشر تلقائي إلى Firebase (الاستضافة + قواعد Firestore) عند كل تحديث
# يتطلب سراً واحداً في إعدادات المستودع باسم FIREBASE_SERVICE_ACCOUNT
# (مفتاح حساب الخدمة من: Firebase Console → Project settings → Service accounts → Generate new private key)
name: Deploy to Firebase

on:
  push:
    branches: [main, claude/merge-490frd, claude/system-redesign-automation-laznc3]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy hosting and Firestore rules
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SA" ]; then
            echo "::warning::السر FIREBASE_SERVICE_ACCOUNT غير مضبوط — تم تخطي النشر التلقائي (أضفه من Settings → Secrets and variables → Actions لتفعيله)"
            exit 0
          fi
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          if npx firebase-tools@latest deploy --project cms-hhc --non-interactive --force; then
            exit 0
          fi
          # النشر الكامل يتطلب إذن Service Usage على حساب الخدمة — عند غيابه
          # ننشر الاستضافة وقواعد Firestore كلاً على حدة لتجاوز فحص تفعيل الواجهات
          echo "::warning::فشل النشر الكامل (غالباً نقص صلاحيات حساب الخدمة) — محاولة نشر الاستضافة فقط"
          npx firebase-tools@latest deploy --only hosting --project cms-hhc --non-interactive --force
          npx firebase-tools@latest deploy --only firestore:rules --project cms-hhc --non-interactive --force \
            || echo "::warning::نُشرت الاستضافة لكن تعذّر نشر قواعد Firestore — امنح حساب الخدمة دور Editor من IAM في Google Cloud"
