# نشر بنقرة واحدة على Render — https://render.com
# بعد إنشاء حساب: New → Blueprint → اختر هذا المستودع، وسيقرأ هذا الملف تلقائياً
services:
  - type: web
    name: chcc-compliance
    runtime: node
    plan: free # ملاحظة: الخطة المجانية بلا قرص دائم — البيانات تُفقد عند إعادة النشر (انظر README)
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/meta
    envVars:
      - key: ANTHROPIC_API_KEY # مفتاح Claude API لتفعيل التحليل الذكي (أدخله من لوحة Render)
        sync: false
      - key: CHCC_MANAGER_PASSWORD # كلمة مرور مدير الالتزام — غيّرها وجوباً في النشر العام
        sync: false
      - key: CHCC_VIEWER_PASSWORD
        sync: false
    # للحفاظ على البيانات بشكل دائم، انتقل لخطة مدفوعة وأزل التعليق عن الأسطر التالية:
    # disk:
    #   name: chcc-data
    #   mountPath: /data
    #   sizeGB: 1
    # ثم أضف متغير البيئة: CHCC_DATA_DIR=/data
